name: Build image for Bridge

on:
  push:
    branches:
      - main
    paths:
      - bridge/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Check tests for Bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: bridge/.node-version
          cache: npm
          cache-dependency-path: bridge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build image for Bridge
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build bridge image
        uses: docker/build-push-action@v7
        with:
          context: ./bridge
          push: false
          tags: bjorkan/meshcore-mqtt-broker-bridge:build-${{ github.sha }}
          outputs: type=docker,dest=/tmp/bridge-image.tar

      - name: Upload bridge image artifact
        uses: actions/upload-artifact@v8
        with:
          name: bridge-image
          path: /tmp/bridge-image.tar
          archive: false
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Publish image bridge
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download bridge image artifact
        uses: actions/download-artifact@v8
        with:
          name: bridge-image
          path: /tmp

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          echo "short_sha=${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"

      - name: Load bridge image
        run: |
          set -euo pipefail
          docker load --input /tmp/bridge-image.tar
          docker tag "bjorkan/meshcore-mqtt-broker-bridge:build-${GITHUB_SHA}" "bjorkan/meshcore-mqtt-broker-bridge:latest"
          docker tag "bjorkan/meshcore-mqtt-broker-bridge:build-${GITHUB_SHA}" "bjorkan/meshcore-mqtt-broker-bridge:sha-${SHORT_SHA}"
        env:
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish bridge image
        run: |
          set -euo pipefail
          docker push "bjorkan/meshcore-mqtt-broker-bridge:latest"
          docker push "bjorkan/meshcore-mqtt-broker-bridge:sha-${SHORT_SHA}"
        env:
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
