name: Build image for Bridge

on:
  push:
    paths:
      - bridge/**
  pull_request:
    paths:
      - bridge/**

permissions:
  contents: read

jobs:
  build:
    name: Build image for Bridge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build bridge image
        uses: docker/build-push-action@v7
        with:
          context: ./bridge
          push: false
          tags: bjorkan/meshcore-mqtt-broker-bridge:build-${{ github.sha }}
          outputs: type=docker,dest=/tmp/bridge-image.tar

      - name: Upload bridge image artifact
        uses: actions/upload-artifact@v7
        with:
          path: /tmp/bridge-image.tar
          archive: false
          if-no-files-found: error
          retention-days: 3
