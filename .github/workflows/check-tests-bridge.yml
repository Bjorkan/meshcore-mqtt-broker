name: Check tests for Bridge

on:
  push:
    paths:
      - bridge/**
      - .github/workflows/check-tests-bridge.yml
  pull_request:
    paths:
      - bridge/**
      - .github/workflows/check-tests-bridge.yml

permissions:
  contents: read

jobs:
  test:
    name: Check tests for Bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: bridge/.node-version
          cache: npm
          cache-dependency-path: bridge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
