name: Build image for Broker

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - jest.config.mjs
      - Dockerfile
      - docker-entrypoint.sh
      - config.yaml
      - scripts/**
      - .github/workflows/build-image-broker.yml
      - renovate.json
      - eslint.config.mjs
      - .prettierrc
      - .prettierignore
      - .editorconfig
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Check tests for Broker
    runs-on: ubuntu-latest
    # Format/lint failures stop the job immediately – build/test do
    # not run, and dependent jobs (build, publish) are skipped via needs.
    services:
      valkey:
        image: valkey/valkey:9-alpine@sha256:c9b77919daeba2c02ad954d0c844cc4e7142069d177b89c5fd771f405daf9e02
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate lockfile portability
        run: npm run check:lockfile

      - name: Install dependencies
        run: npm ci

      - name: Check formatting and linting
        run: npm run format:check && npm run lint

      - name: Validate Renovate config
        run: npx --yes --package renovate renovate-config-validator

      - name: Build and run tests
        if: success()
        run: npm run test:ci

      - name: Upload npm logs on failure for debugging
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-debug-logs
          path: ~/.npm/_logs/
          if-no-files-found: ignore
          retention-days: 3

  build:
    name: Build image for Broker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build broker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          tags: bjorkan/meshcore-mqtt-broker:build-${{ github.sha }}
          outputs: type=docker,dest=/tmp/broker-image.tar

      - name: Docker Scout broker image
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1
        with:
          command: cves
          image: archive:///tmp/broker-image.tar
          only-severities: critical,high
          only-fixed: true
          exit-code: true
          summary: true
          write-comment: false
          dockerhub-user: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Upload broker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: broker-image
          path: /tmp/broker-image.tar
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Publish image broker
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download broker image artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: broker-image
          path: /tmp

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          echo "short_sha=${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"

      - name: Load broker image
        run: |
          set -euo pipefail
          docker load --input /tmp/broker-image.tar
          docker tag "bjorkan/meshcore-mqtt-broker:build-${GITHUB_SHA}" "bjorkan/meshcore-mqtt-broker:latest"
          docker tag "bjorkan/meshcore-mqtt-broker:build-${GITHUB_SHA}" "bjorkan/meshcore-mqtt-broker:sha-${SHORT_SHA}"
          docker tag "bjorkan/meshcore-mqtt-broker:build-${GITHUB_SHA}" "ghcr.io/bjorkan/meshcore-mqtt-broker:latest"
          docker tag "bjorkan/meshcore-mqtt-broker:build-${GITHUB_SHA}" "ghcr.io/bjorkan/meshcore-mqtt-broker:sha-${SHORT_SHA}"
        env:
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish broker image
        run: |
          set -euo pipefail
          docker push "bjorkan/meshcore-mqtt-broker:latest"
          docker push "bjorkan/meshcore-mqtt-broker:sha-${SHORT_SHA}"
          docker push "ghcr.io/bjorkan/meshcore-mqtt-broker:latest"
          docker push "ghcr.io/bjorkan/meshcore-mqtt-broker:sha-${SHORT_SHA}"
        env:
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
