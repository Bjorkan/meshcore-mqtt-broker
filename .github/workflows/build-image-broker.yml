name: Build image for Broker

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - jest.config.mjs
      - Dockerfile
      - docker-entrypoint.sh
      - config.yaml
      - scripts/**
      - .github/workflows/build-image-broker.yml
      - eslint.config.mjs
      - .prettierrc
      - .prettierignore
      - .editorconfig
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Check tests for Broker
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:9-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting and linting
        run: npm run format:check && npm run lint

      - name: Build and run tests
        if: success()
        run: npm run test:ci

      - name: Upload test results on failure for debugging
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-debug-info
          path: |
            /home/runner/.npm/_logs/
          if-no-files-found: ignore
          retention-days: 3

  build:
    name: Build image for Broker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build broker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: bjorkan/meshcore-mqtt-broker:build-${{ github.sha }}
          outputs: type=docker,dest=/tmp/broker-image.tar

      - name: Docker Scout broker image
        uses: docker/scout-action@v1
        with:
          command: cves
          image: archive:///tmp/broker-image.tar
          only-severities: critical,high
          only-fixed: true
          exit-code: true
          summary: true
          write-comment: false
          dockerhub-user: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Upload broker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: broker-image
          path: /tmp/broker-image.tar
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Publish image broker
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download broker image artifact
        uses: actions/download-artifact@v7
        with:
          name: broker-image
          path: /tmp

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          echo "short_sha=${GITHUB_SHA::12}" >> "${GITHUB_OUTPUT}"

      - name: Load broker image
        run: |
          set -euo pipefail
          docker load --input /tmp/broker-image.tar
          docker tag "bjorkan/meshcore-mqtt-broker:build-${GITHUB_SHA}" "bjorkan/meshcore-mqtt-broker:latest"
          docker tag "bjorkan/meshcore-mqtt-broker:build-${GITHUB_SHA}" "bjorkan/meshcore-mqtt-broker:sha-${SHORT_SHA}"
          docker tag "bjorkan/meshcore-mqtt-broker:build-${GITHUB_SHA}" "ghcr.io/bjorkan/meshcore-mqtt-broker:latest"
          docker tag "bjorkan/meshcore-mqtt-broker:build-${GITHUB_SHA}" "ghcr.io/bjorkan/meshcore-mqtt-broker:sha-${SHORT_SHA}"
        env:
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish broker image
        run: |
          set -euo pipefail
          docker push "bjorkan/meshcore-mqtt-broker:latest"
          docker push "bjorkan/meshcore-mqtt-broker:sha-${SHORT_SHA}"
          docker push "ghcr.io/bjorkan/meshcore-mqtt-broker:latest"
          docker push "ghcr.io/bjorkan/meshcore-mqtt-broker:sha-${SHORT_SHA}"
        env:
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
