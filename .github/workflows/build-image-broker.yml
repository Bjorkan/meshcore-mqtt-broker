name: Build image for Broker

on:
  push:
    paths:
      - broker/**
  pull_request:
    paths:
      - broker/**

permissions:
  contents: read

jobs:
  build:
    name: Build image for Broker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build broker image
        uses: docker/build-push-action@v7
        with:
          context: ./broker
          push: false
          tags: bjorkan/meshcore-mqtt-broker:build-${{ github.sha }}
          outputs: type=docker,dest=/tmp/broker-image.tar

      - name: Upload broker image artifact
        uses: actions/upload-artifact@v7
        with:
          path: /tmp/broker-image.tar
          archive: false
          if-no-files-found: error
          retention-days: 3
