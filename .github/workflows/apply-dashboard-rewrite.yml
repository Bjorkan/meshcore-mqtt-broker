name: Apply dashboard rewrite

on:
  push:
    branches:
      - fix/dashboard-ui-mobile-overhaul
    paths:
      - .github/workflows/apply-dashboard-rewrite.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply staged rewrite
        shell: bash
        run: |
          set -euo pipefail
          cat .dashboard-rewrite-patch/part-* | base64 -d | gzip -d > /tmp/dashboard-rewrite.patch
          test "$(sha256sum /tmp/dashboard-rewrite.patch | cut -d' ' -f1)" = "1160c32fffd27e4a2acfe36c6e7c95792331e3037322e8922b4ff59d414476aa"
          git apply --3way /tmp/dashboard-rewrite.patch
          rm -rf .dashboard-rewrite-patch
          rm -f .github/workflows/apply-dashboard-rewrite.yml
          git config user.name "OpenAI"
          git config user.email "noreply@openai.com"
          git add -A
          git commit -m "Rewrite dashboard with Material Design 3"
          git push origin HEAD
