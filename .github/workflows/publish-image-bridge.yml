name: Publish image bridge

on:
  workflow_run:
    workflows:
      - Build image for Bridge
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  publish:
    name: Publish image bridge
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Download bridge image artifact
        uses: actions/download-artifact@v8
        with:
          name: bridge-image.tar
          path: /tmp
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Prepare tags
        id: tags
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          short_sha="${HEAD_SHA::12}"
          {
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Load bridge image
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          docker load --input /tmp/bridge-image.tar
          docker tag "bjorkan/meshcore-mqtt-broker-bridge:build-${HEAD_SHA}" "bjorkan/meshcore-mqtt-broker-bridge:latest"
          docker tag "bjorkan/meshcore-mqtt-broker-bridge:build-${HEAD_SHA}" "bjorkan/meshcore-mqtt-broker-bridge:sha-${HEAD_SHA::12}"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish bridge image
        run: |
          set -euo pipefail
          docker push "bjorkan/meshcore-mqtt-broker-bridge:latest"
          docker push "bjorkan/meshcore-mqtt-broker-bridge:sha-${SHORT_SHA}"
        env:
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
