# MeshCore MQTT Broker runtime configuration
#
# This file is read-only at runtime. In Docker Swarm it can be mounted as a
# docker config, for example at /run/configs/meshcore-mqtt-broker-config.yaml.

mqtt:
  ws_port: 8883
  host: 0.0.0.0
  ws_max_payload_bytes: 65536
  json_publish_max_bytes: 8192

dashboard:
  port: 8080

broker:
  kv_url: redis://valkey:6379
  kv_namespace: meshcore-mqtt-broker
  name: Broker
  node_name_cache_ttl_ms: 86400000

target_mqtt:
  url: ""
  username: ""
  password: ""
  reject_unauthorized: true
  reconnect_period_ms: 5000
  connect_timeout_ms: 30000

proxy:
  trust_proxy: false
  trusted_proxy_cidrs: ""

auth:
  expected_audience: mqtt.yourdomain.com

subscribers:
  default_max_connections: 2
  users:
    - username: viewer1
      password: your-secure-password-here
      role: 2
    - username: admin
      password: admin-password-here
      role: 1
      max_connections: 10
    - username: limited
      password: limited-password
      role: 3

healthcheck:
  mqtt_timeout_ms: 10000
  mqtt_keepalive_seconds: 60
  valkey_timeout_ms: 10000
  valkey_ready_max_age_ms: 120000

abuse:
  enforcement_enabled: false
  duplicate_window_size: 100
  duplicate_window_ms: 300000
  duplicate_threshold: 10
  max_duplicates_per_packet: 5
  duplicate_rate_threshold: 0.3
  duplicate_rate_window_ms: 300000
  bucket_capacity: 20
  bucket_refill_rate: 3
  max_packet_size: 255
  max_topics_per_day: 3
  anomaly_threshold: 10
  max_iata_changes_24h: 3
  topic_history_size: 50
  topic_history_window_ms: 86400000

